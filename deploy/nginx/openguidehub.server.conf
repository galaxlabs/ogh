# Install this on the server after DNS points these subdomains to the server IP.
# Suggested mapping:
# - api.openguidehub.org    -> admin API on 3100
# - health.openguidehub.org -> health endpoint on 3100/health
# - admin.openguidehub.org  -> PocketBase superuser UI on 8090

server {
    listen 80;
    server_name api.openguidehub.org;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name health.openguidehub.org;

    location / {
        proxy_pass http://127.0.0.1:3100/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin.openguidehub.org;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
